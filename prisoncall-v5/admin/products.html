<script type="module">
  import { initAdminPage, api, logout, fmtCurrency, showToast } from '/admin/admin-auth.js';

  const INTERVAL_ORDER = ['weekly', 'fortnightly', 'monthly', 'annual'];
  const ADDON_GROUPS = [
    { key: 'addon_48hr',    label: '48 Hours Cancellation Guarantee', types: ['one_time'] },
    { key: 'addon_transfer', label: 'Unlimited Prison Transfers', types: ['weekly','fortnightly','monthly','annual'] },
    { key: 'addon_post_renewal', label: '96 Hours Post Renewal Cancellation', types: ['weekly','fortnightly','monthly','annual'] },
    { key: 'addon_combo23', label: 'Unlimited Transfers + 96hr Bundle Deal', types: ['weekly','fortnightly','monthly','annual'] },
    { key: 'addon_lifetime', label: 'Lifetime Protection Bundle', types: ['one_time'] },
  ];

  async function init() {
    const session = await initAdminPage();
    if (!session) return;
    if (session.user?.role !== 'super_admin') {
      document.getElementById('productsContent').innerHTML =
        '<div class="alert alert--error" style="margin:24px">Access denied. This page is restricted to administrators.</div>';
      return;
    }
    loadProducts();
  }

  async function loadProducts() {
    const container = document.getElementById('productsContent');
    try {
      const products = await api('getProducts');

      if (!products || products.length === 0) {
        container.innerHTML = '<div class="empty-state"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M20 7l-8-4-8 4"/></svg><h3>No products found</h3><p>Products have not been set up yet in Supabase</p></div>';
        return;
      }

      // Group products by type/interval
      const plans = products.filter(p => p.product_type === 'plan');
      const addons = products.filter(p => p.product_type !== 'plan');

      // Sort plans by interval
      const sortedPlans = INTERVAL_ORDER
        .map(iv => plans.find(p => p.interval === iv))
        .filter(Boolean);

      let html = `
        <div class="card mb-20">
          <div class="product-section-title">Plans</div>
          <div id="plansSection">
            ${sortedPlans.map(p => renderProductRow(p)).join('')}
            ${sortedPlans.length === 0 ? '<div style="padding:20px;color:var(--color-muted);font-size:14px">No plan products found</div>' : ''}
          </div>
        </div>
      `;

      // Group add-ons by product_key prefix or product name grouping
      const addonGroupsHtml = renderAddonGroups(addons);
      html += `
        <div class="card">
          <div class="product-section-title">Add-ons</div>
          ${addonGroupsHtml}
        </div>
      `;

      container.innerHTML = html;

      // Attach save handlers
      document.querySelectorAll('.save-product-btn').forEach(btn => {
        btn.addEventListener('click', () => saveProduct(btn.dataset.id));
      });

      document.querySelectorAll('.toggle-active-btn').forEach(input => {
        input.addEventListener('change', () => saveProduct(input.dataset.id));
      });

    } catch (err) {
      container.innerHTML = `<div class="alert alert--error"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18"><circle cx="12" cy="12" r="10"/></svg>${err.message}</div>`;
    }
  }

  function renderProductRow(product) {
    const intervalLabel = product.interval
      ? product.interval.charAt(0).toUpperCase() + product.interval.slice(1)
      : product.product_type === 'one_time' ? 'One-time' : '-';

    return `
      <div class="product-row" data-product-id="${product.id}">
        <div>
          <div class="product-name">${product.product_name || '-'}</div>
          <div class="product-interval">${intervalLabel}</div>
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:var(--color-muted);display:block;margin-bottom:4px">Price ($)</label>
          <input class="form-input" type="number" step="0.01" min="0"
            id="price_${product.id}"
            value="${product.price != null ? product.price : ''}"
            placeholder="0.00"
            style="max-width:120px">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:var(--color-muted);display:block;margin-bottom:4px">Stripe Price ID</label>
          <input class="form-input font-mono" type="text"
            id="stripe_${product.id}"
            value="${product.stripe_price_id || ''}"
            placeholder="price_..."
            style="font-size:13px">
        </div>
        <div>
          <label style="font-size:12px;font-weight:700;color:var(--color-muted);display:block;margin-bottom:4px">Active</label>
          <label class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" class="toggle-active-btn"
                data-id="${product.id}"
                ${product.active ? 'checked' : ''}>
              <span class="toggle-slider"></span>
            </label>
          </label>
        </div>
        <div>
          <button class="btn btn--green btn--sm save-product-btn" data-id="${product.id}" id="save_${product.id}">
            Save
          </button>
        </div>
      </div>
    `;
  }

  function renderAddonGroups(addons) {
    if (addons.length === 0) {
      return '<div style="padding:20px;color:var(--color-muted);font-size:14px">No add-on products found</div>';
    }

    // Group by product_key or name prefix
    const grouped = {};
    addons.forEach(p => {
      const groupKey = p.product_key ? p.product_key.replace(/_(weekly|fortnightly|monthly|annual|one_time)$/, '') : p.product_name;
      if (!grouped[groupKey]) grouped[groupKey] = { name: p.product_name?.replace(/\s*-?\s*(Weekly|Fortnightly|Monthly|Annual|One.time)$/i,'').trim() || groupKey, items: [] };
      grouped[groupKey].items.push(p);
    });

    return Object.values(grouped).map(group => `
      <div style="border-top:1px solid var(--color-border)">
        <div style="padding:10px 20px;font-size:12px;font-weight:700;color:var(--color-muted);text-transform:uppercase;letter-spacing:0.04em;background:var(--color-bg)">
          ${group.name}
        </div>
        ${group.items.sort((a,b) => INTERVAL_ORDER.indexOf(a.interval) - INTERVAL_ORDER.indexOf(b.interval)).map(p => renderProductRow(p)).join('')}
      </div>
    `).join('');
  }

  async function saveProduct(id) {
    const btn = document.getElementById(`save_${id}`);
    const priceInput = document.getElementById(`price_${id}`);
    const stripeInput = document.getElementById(`stripe_${id}`);
    const activeInput = document.querySelector(`.toggle-active-btn[data-id="${id}"]`);

    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    const fields = {};
    if (priceInput) fields.price = parseFloat(priceInput.value) || 0;
    if (stripeInput) fields.stripe_price_id = stripeInput.value.trim() || null;
    if (activeInput) fields.active = activeInput.checked;

    try {
      await api('updateProduct', { id, fields });
      showToast('Saved');
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    } catch (err) {
      showToast(err.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = 'Save'; }
    }
  }

  window.doLogout = function() {
    import('/admin/admin-auth.js').then(m => m.logout());
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/admin/sw.js').catch(() => {});
  }

  init();
</script>
