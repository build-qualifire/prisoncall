<body>

        Customers
      </a>
      <a href="/admin/products.html" class="sidebar-nav-item" data-role-min="super_admin">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Products
      </a>
      <a href="/admin/settings.html" class="sidebar-nav-item" data-role-min="super_admin">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user-email" data-user-email></div>
      <button class="btn-logout" onclick="doLogout()">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Sign out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="admin-main">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="/admin/customers.html" style="display:flex;align-items:center;color:var(--color-muted)" title="Back to customers">
          <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        </a>
        <div class="admin-topbar-title" id="pageTitle">Customer Detail</div>
      </div>
      <div id="topbarBadge"></div>
    </header>

    <div class="admin-content" id="mainContent">
      <div class="loading-state">
        <div class="spinner"></div>
        Loading customer...
      </div>
    </div>
  </main>

  <!-- Bottom tab bar -->
  <nav class="admin-bottom-bar">
    <div class="bottom-bar-inner">
      <a href="/admin/dashboard.html" class="bottom-bar-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="/admin/orders.html" class="bottom-bar-item">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        <span>Orders</span>
      </a>
      <a href="/admin/customers.html" class="bottom-bar-item active" data-role-min="admin">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span>Customers</span>
      </a>
      <a href="/admin/products.html" class="bottom-bar-item" data-role-min="super_admin">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        <span>Products</span>
      </a>
      <a href="/admin/settings.html" class="bottom-bar-item" data-role-min="super_admin">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Settings</span>
      </a>
    </div>
  </nav>

</div>

<script type="module">
  import { initAdminPage, api, logout, fmtDate, fmtDatetime, fmtMobile, fmtCurrency, statusBadge, orderTypeBadge, copyToClipboard } from '/admin/admin-auth.js';

  const urlParams = new URLSearchParams(window.location.search);
  const subId = urlParams.get('id');

  async function init() {
    const session = await initAdminPage('admin');
    if (!session) return;
    if (!subId) { showError('No customer ID specified'); return; }
    loadCustomer();
  }

  function showError(msg) {
    document.getElementById('mainContent').innerHTML = `
      <div class="alert alert--error">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" width="18" height="18"><circle cx="12" cy="12" r="10"/></svg>
        ${msg}
      </div>
    `;
  }

  async function loadCustomer() {
    try {
      const [sub, orders] = await Promise.all([
        api('getSubscription', { id: subId }),
        api('getSubscription', { id: subId }).then(s =>
          s?.stripe_subscription_id ? api('getOrdersBySubscription', { stripe_subscription_id: s.stripe_subscription_id }) : []
        ),
      ]);

      if (!sub) { showError('Customer not found'); return; }

      // Reload orders using the subscription
      let customerOrders = [];
      if (sub.stripe_subscription_id) {
        try {
          customerOrders = await api('getOrdersBySubscription', { stripe_subscription_id: sub.stripe_subscription_id });
        } catch {
          customerOrders = [];
        }
      }

      document.getElementById('pageTitle').textContent = sub.customer_name || 'Customer';
      document.getElementById('topbarBadge').innerHTML = statusBadge(sub.status);

      const addonsList = [];
      if (sub.addon_48hr_cancel) addonsList.push('48hr Cancel');
      if (sub.addon_transfers)   addonsList.push('Unlimited Transfers');
      if (sub.addon_post_renewal)addonsList.push('96hr Post Renewal');
      if (sub.addon_combo23)     addonsList.push('Bundle 2+3');
      if (sub.addon_lifetime)    addonsList.push('Lifetime Protection');

      const addonsHtml = addonsList.length
        ? addonsList.map(a => `<span class="badge badge--blue" style="margin:2px">${a}</span>`).join(' ')
        : '<span style="color:var(--color-muted);font-size:13px">None</span>';

      const ordersHtml = customerOrders.length === 0
        ? '<div class="empty-state" style="padding:32px"><h3>No orders found</h3><p>No orders linked to this subscription</p></div>'
        : `
          <div class="table-wrap">
            <table class="data-table">
              <thead><tr><th>Type</th><th>Prison</th><th>Status</th><th>Date</th></tr></thead>
              <tbody>
                ${customerOrders.map(o => `
                  <tr onclick="window.location='/admin/order-detail.html?id=${o.id}'" style="cursor:pointer">
                    <td>${orderTypeBadge(o.order_type)}</td>
                    <td>
                      <div style="font-weight:600;font-size:14px">${o.prison_name || '-'}</div>
                      <div class="col-sub">${o.prison_state || ''}</div>
                    </td>
                    <td>${statusBadge(o.status)}</td>
                    <td style="font-size:13px;color:var(--color-muted)">${fmtDate(o.order_date)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;

      document.getElementById('mainContent').innerHTML = `
        <div class="detail-grid">
          <div>
            <div class="card mb-16">
              <div class="card-header">
                <div class="card-title">Subscriber Details</div>
                ${statusBadge(sub.status)}
              </div>
              <div class="card-body">
                <div class="detail-row">
                  <div class="detail-key">Name</div>
                  <div class="detail-val">${sub.customer_name || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Mobile</div>
                  <div class="detail-val">${fmtMobile(sub.customer_mobile)}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Email</div>
                  <div class="detail-val" style="word-break:break-all">${sub.customer_email || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Prison</div>
                  <div class="detail-val">${sub.prison_name || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">State</div>
                  <div class="detail-val">${sub.prison_state || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Current DID</div>
                  <div class="detail-val font-mono copyable" onclick="doCopy(this,'${sub.current_did||''}')" title="Click to copy" style="color:var(--color-green);font-weight:700">${sub.current_did || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">3CX Extension</div>
                  <div class="detail-val font-mono">${sub.current_extension || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Plan</div>
                  <div class="detail-val" style="text-transform:capitalize">${sub.plan_interval || '-'} - ${fmtCurrency(sub.plan_price)}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Add-ons</div>
                  <div class="detail-val" style="text-align:right;flex-wrap:wrap">${addonsHtml}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Next billing</div>
                  <div class="detail-val">${fmtDate(sub.next_billing_date)}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Member since</div>
                  <div class="detail-val">${fmtDate(sub.created_at)}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Stripe Sub ID</div>
                  <div class="detail-val mono font-mono copyable" onclick="doCopy(this,'${sub.stripe_subscription_id||''}')" title="Click to copy">${sub.stripe_subscription_id || '-'}</div>
                </div>
                <div class="detail-row">
                  <div class="detail-key">Stripe Cust ID</div>
                  <div class="detail-val mono font-mono copyable" onclick="doCopy(this,'${sub.stripe_customer_id||''}')" title="Click to copy">${sub.stripe_customer_id || '-'}</div>
                </div>
              </div>
            </div>
          </div>

          <div>
            <div class="card">
              <div class="card-header"><div class="card-title">Quick Info</div></div>
              <div class="card-body">
                <div style="display:grid;gap:12px">
                  <div style="padding:12px;background:var(--color-green-mid);border-radius:var(--radius-sm);text-align:center">
                    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-muted);margin-bottom:4px">Total Orders</div>
                    <div style="font-size:28px;font-weight:800;color:var(--color-hero)">${customerOrders.length}</div>
                  </div>
                  ${sub.current_did ? `
                    <div style="padding:12px;background:var(--color-surface);border-radius:var(--radius-sm);text-align:center">
                      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--color-muted);margin-bottom:4px">Active DID</div>
                      <div style="font-size:20px;font-weight:800;color:var(--color-green);font-family:'Courier New',monospace">${sub.current_did}</div>
                    </div>
                  ` : ''}
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Order history -->
        <div class="card mt-16">
          <div class="card-header">
            <div class="card-title">Order History</div>
            <span class="badge badge--grey">${customerOrders.length} order${customerOrders.length !== 1 ? 's' : ''}</span>
          </div>
          ${ordersHtml}
        </div>
      `;
    } catch (err) {
      showError(err.message);
    }
  }

  window.doCopy = function(el, text) {
    if (!text) return;
    copyToClipboard(text, el);
  };

  window.doLogout = function() {
    import('/admin/admin-auth.js').then(m => m.logout());
  };

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/admin/sw.js').catch(() => {});
  }

  init();
</script>

</body>
</html>
