name               = "voipline-proxy"
main               = "functions/voipline-proxy.js"
compatibility_date = "2024-11-01"

# Cron runs every 15 minutes to keep the VoipLine session alive by pinging an
# authenticated endpoint. VoipLine sessions expire from inactivity; this prevents
# that from ever occurring under normal operation.
[triggers]
crons = ["*/15 * * * *"]

# KV namespace for mutable session-cookie storage.
# This lets the owner update the cookie from a phone browser without CLI tools.
#
# One-time setup (run once, then paste the id below):
#   npx wrangler kv namespace create SESSION_KV
#
[[kv_namespaces]]
binding = "SESSION_KV"
id      = "52ab4b0d42d64da791b414ce9a652d15"
